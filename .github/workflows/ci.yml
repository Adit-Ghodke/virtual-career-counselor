name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      GROQ_API_KEY: fake-key-for-ci
      TAVILY_API_KEY: fake-key-for-ci
      ADZUNA_APP_ID: fake-id-for-ci
      ADZUNA_APP_KEY: fake-key-for-ci
      AWS_ACCESS_KEY_ID: fake-key-for-ci
      AWS_SECRET_ACCESS_KEY: fake-key-for-ci
      AWS_REGION: us-east-1
      SECRET_KEY: ci-test-secret
      PORT: "10000"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short
