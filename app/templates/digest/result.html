{% extends "base.html" %}
{% block title %}Your Weekly Digest{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-9">
        <a href="{{ url_for('digest.preferences') }}" class="btn btn-outline-secondary btn-sm mb-3"><i class="bi bi-arrow-left me-1"></i>Back to Preferences</a>

        <div class="card shadow-sm border-0">
            <div class="card-header bg-success text-white">
                <h5 class="mb-0"><i class="bi bi-newspaper me-2"></i>Your Weekly Career Digest</h5>
            </div>
            <div class="card-body">
                <div class="mb-2">
                    <small class="text-muted">Industries: {{ industries | join(', ') }}</small>
                </div>
                <hr>
                <div class="ai-response">{{ result | md | safe }}</div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
